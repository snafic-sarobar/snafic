<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon-raw.svg">
<title>Profile Photo - Snafic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
<script src="translations.js"></script>
<script src="firebase-init.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{min-height:100vh;background:#0b1220;color:white;display:flex;align-items:center;justify-content:center;padding:20px}
.navbar{position:relative;height:56px;background:transparent;display:flex;align-items:center;padding:0 12px}
.bg{position:fixed;inset:0;background:linear-gradient(135deg,#08111f,#0f172a)}
.bg::before,.bg::after{content:"";position:absolute;border-radius:50%;filter:blur(90px);animation:blobMove 10s ease-in-out infinite}
.bg::before{width:380px;height:380px;background:#2563eb;left:-120px;top:-120px}
.bg::after{width:320px;height:320px;background:#60a5fa;right:-80px;bottom:-80px;animation-delay:2s}
@keyframes blobMove{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
.logo{position:absolute;top:8px;left:12px;height:50px;width:auto;background:none;cursor:pointer;display:flex;align-items:center}
.logo img{height:50px;width:auto}
.card{position:relative;overflow:hidden;width:480px;background:rgba(255,255,255,.08);backdrop-filter:blur(25px);border-radius:28px;border:1px solid rgba(255,255,255,.12);padding:36px;z-index:2;box-shadow:0 25px 60px rgba(0,0,0,.25);text-align:center}
.card::before{content:"";position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(96,165,250,.28),transparent 70%);top:-60px;right:-60px}
.card h2{font-size:24px;margin-bottom:4px;position:relative;z-index:2}
.card .sub{color:#94a3b8;font-size:14px;margin-bottom:20px;position:relative;z-index:2}
.avatar-preview{width:160px;height:160px;border-radius:50%;margin:0 auto 16px;overflow:hidden;border:3px solid rgba(96,165,250,.3);position:relative;z-index:2;background:linear-gradient(135deg,#2563eb33,#60a5fa33);display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:800;color:rgba(255,255,255,.2);cursor:grab}
.avatar-preview.dragging{cursor:grabbing}
.avatar-preview img{position:absolute;max-width:none;max-height:none;user-select:none;-webkit-user-drag:none}
.upload-area{position:relative;z-index:2;margin-bottom:16px}
.upload-btn{display:inline-block;padding:12px 28px;border-radius:14px;border:1px solid rgba(96,165,250,.3);color:#60a5fa;cursor:pointer;font-weight:600;font-size:14px;transition:.3s;background:rgba(96,165,250,.08)}
.upload-btn:hover{background:rgba(96,165,250,.15)}
input[type="file"]{display:none}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:8px 0;position:relative;z-index:2;justify-content:center;flex-wrap:wrap}
.filter-btn{width:60px;height:60px;border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.3s;flex-shrink:0;background:rgba(255,255,255,.05)}
.filter-btn.active{border-color:#60a5fa}
.filter-btn img{width:100%;height:100%;object-fit:cover}
.filter-btn .flabel{font-size:9px;color:#94a3b8;text-align:center;display:block;margin-top:2px}
.btn-group{display:flex;gap:10px;margin-top:8px;position:relative;z-index:2}
.btn{flex:1;padding:14px;border:none;border-radius:14px;cursor:pointer;font-weight:700;font-size:15px;transition:.35s}
.btn-primary{color:white;background:linear-gradient(135deg,#2563eb,#60a5fa)}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(37,99,235,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.15);color:#cbd5e1}
.btn-ghost:hover{background:rgba(255,255,255,.05)}
.crop-controls{display:flex;gap:10px;margin:16px 0 0;justify-content:center;z-index:2;flex-wrap:wrap}
.crop-btn{padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:white;cursor:pointer;font-size:13px;transition:.3s}
.crop-btn:hover{background:rgba(255,255,255,.1)}
.crop-btn-primary{background:linear-gradient(135deg,#2563eb,#60a5fa);border-color:transparent;color:white}
.crop-btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,235,.3)}
#cropContainer{position:relative;margin:12px auto;width:100%;max-height:50vh;overflow:hidden;border-radius:12px;z-index:2}
#cropContainer .crop-viewport{position:relative;width:100%;overflow:hidden}
#cropContainer #cropImage{position:absolute;cursor:move;max-width:none;max-height:none;user-select:none;-webkit-user-drag:none}
.zoom-row{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
.zoom-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:white;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
.zoom-btn:hover{background:rgba(255,255,255,.1)}
#zoomLevel{color:#94a3b8;font-size:12px;display:flex;align-items:center}
.crop-overlay{position:absolute;inset:0;z-index:3}
.crop-box{position:absolute;border:2px dashed white;cursor:move;z-index:5;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
.crop-handle{position:absolute;width:18px;height:18px;background:white;border:2px solid #2563eb;border-radius:50%;z-index:6;transition:transform .15s}
.crop-handle:hover{transform:scale(1.25)}
.crop-handle.tl{top:-9px;left:-9px;cursor:nwse-resize}
.crop-handle.tr{top:-9px;right:-9px;cursor:nesw-resize}
.crop-handle.bl{bottom:-9px;left:-9px;cursor:nesw-resize}
.crop-handle.br{bottom:-9px;right:-9px;cursor:nwse-resize}
.error{color:#ef4444;font-size:13px;margin-top:8px;min-height:20px;position:relative;z-index:2}
.modal-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-content{background:#141d2b;border:1px solid rgba(255,255,255,.12);border-radius:24px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;padding:28px;box-shadow:0 25px 60px rgba(0,0,0,.5);position:relative}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h3{font-size:18px}
.modal-close{background:none;border:none;color:#94a3b8;font-size:24px;cursor:pointer;padding:4px 8px;border-radius:8px}
.modal-close:hover{background:rgba(255,255,255,.08);color:white}
@media(max-width:500px){.card{padding:24px;margin:0 10px}.avatar-preview{width:110px;height:110px}}
</style>
</head>
<body>
<div class="bg"></div>
<nav class="navbar"><div class="logo"><img src="logo/logo-transparent.png" alt="SNAFIC"></div></nav>
<div class="card">
    <h2>Choose your profile photo</h2>
    <p class="sub">Add a photo so friends can recognize you</p>
    <div class="avatar-preview" id="avatarPreview">📷</div>
    <div class="upload-area">
        <label class="upload-btn" for="photoInput">Upload Photo</label>
        <input type="file" id="photoInput" accept="image/*" onchange="handleFile(this)">
    </div>
    <div class="error" id="saveError"></div>
    <div class="btn-group">
        <button class="btn btn-ghost" onclick="skip()">Skip</button>
        <button class="btn btn-primary" id="saveBtn" onclick="save()">Save & Finish</button>
    </div>
</div>

<div class="modal-overlay" id="cropModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Crop & Edit</h3>
            <button class="modal-close" onclick="cancelCrop()">&times;</button>
        </div>
        <div class="zoom-row">
            <button class="zoom-btn" onclick="zoomIn()">+</button>
            <span id="zoomLevel">100%</span>
            <button class="zoom-btn" onclick="zoomOut()">-</button>
        </div>
        <div id="cropContainer">
            <div class="crop-viewport" id="cropViewport">
                <img id="cropImage" src="" alt="Crop preview">
                <div class="crop-overlay" id="cropOverlay">
                    <div class="crop-box" id="cropBox">
                        <div class="crop-handle tl"></div>
                        <div class="crop-handle tr"></div>
                        <div class="crop-handle bl"></div>
                        <div class="crop-handle br"></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="previewContainer" style="display:none;margin:12px auto;width:200px;height:200px;border-radius:50%;overflow:hidden;border:3px solid rgba(96,165,250,.3)">
            <img id="previewCropped" src="" style="width:100%;height:100%;object-fit:cover">
        </div>
        <div class="filter-row" id="filterRow"></div>
        <div class="crop-controls" id="cropControls">
            <button class="crop-btn" id="cancelCropBtn" onclick="cancelCrop()">&larr; Back</button>
            <button class="crop-btn crop-btn-primary" id="applyCropBtn" onclick="applyCrop()">&#10003; Apply</button>
        </div>
    </div>
</div>

<script>
auth.onAuthStateChanged(u => { if (!u) window.location.href = "index.html"; });

let uploadedFile = null;
let croppedBlob = null;
let currentFilter = "none";
let hasCropped = false;
let croppedPreviewUrl = null;
let previewOffset = { x: 0, y: 0 };
let previewDragState = null;

const filters = [
  {name:"none",label:"Original",css:""},
  {name:"clarendon",label:"Clarendon",css:"brightness(1.1) contrast(1.2) saturate(1.3)"},
  {name:"gingham",label:"Gingham",css:"brightness(1.05) hue-rotate(-10deg)"},
  {name:"moon",label:"Moon",css:"grayscale(1) brightness(1.1)"},
  {name:"lark",label:"Lark",css:"brightness(1.05) contrast(.9) saturate(.8)"},
  {name:"reyes",label:"Reyes",css:"brightness(.9) sepia(.3) saturate(.8)"},
  {name:"juno",label:"Juno",css:"brightness(1.1) saturate(1.2) hue-rotate(10deg)"},
  {name:"slumber",label:"Slumber",css:"brightness(.95) saturate(.7) sepia(.2)"},
  {name:"aden",label:"Aden",css:"brightness(1.1) saturate(.8) hue-rotate(-20deg)"},
  {name:"perpetua",label:"Perpetua",css:"brightness(1.05) contrast(1.1) sepia(.1)"}
];

let cropState = null;
let cropBox = { x: 0, y: 0, size: 200 };
let dragState = null;
let imgOffset = { x: 0, y: 0 };
let imgScale = 1;
let viewportW = 0;

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  croppedBlob = null; hasCropped = false;
  uploadedFile = file;
  document.querySelector('.upload-area').style.display = 'none';
  document.querySelector('.btn-group').style.display = 'none';
  document.getElementById('avatarPreview').innerHTML = '📷';
  const reader = new FileReader();
  reader.onload = function(e) { showCropMode(e.target.result); };
  reader.readAsDataURL(file);
}

function showCropMode(src) {
  const cropImg = document.getElementById('cropImage');
  currentFilter = "none";
  document.getElementById('filterRow').innerHTML = '';
  document.getElementById('cropModal').classList.add('show');
  imgOffset = { x: 0, y: 0 };
  imgScale = 1;
  cropImg.src = src;
  cropImg.onload = function() {
    const vp = document.getElementById('cropViewport');
    viewportW = vp.clientWidth;
    const w = cropImg.naturalWidth, h = cropImg.naturalHeight;
    const fitW = viewportW, fitH = viewportW * (h / w);
    imgScale = 1;
    cropImg.style.width = fitW + 'px';
    cropImg.style.height = fitH + 'px';
    cropImg.style.left = '0px';
    cropImg.style.top = '0px';
    vp.style.height = Math.min(fitH, window.innerHeight * 0.5) + 'px';
    const dw = cropImg.clientWidth, dh = cropImg.clientHeight;
    cropState = { naturalW: w, naturalH: h, displayW: dw, displayH: dh };
    const size = Math.floor(Math.min(dw, dh));
    cropBox = { x: Math.floor((dw - size) / 2), y: Math.floor((dh - size) / 2), size };
    renderCropBox();
    document.getElementById('zoomLevel').textContent = Math.round(imgScale * 100) + '%';
  };
}

function zoomIn() { setZoom(imgScale + 0.25); }
function zoomOut() { setZoom(imgScale - 0.25); }
function setZoom(z) {
  z = Math.max(0.5, Math.min(3, z));
  if (!cropState) return;
  const img = document.getElementById('cropImage');
  const vw = viewportW;
  const newW = vw * z;
  const newH = newW * (cropState.naturalH / cropState.naturalW);
  img.style.width = newW + 'px';
  img.style.height = newH + 'px';
  imgOffset = { x: 0, y: 0 };
  imgScale = z;
  const vp = document.getElementById('cropViewport');
  vp.style.height = Math.min(newH, window.innerHeight * 0.5) + 'px';
  cropState.displayW = newW;
  cropState.displayH = newH;
  const size = Math.floor(Math.min(newW, newH) * 0.4);
  cropBox = { x: Math.floor((newW - size) / 2), y: Math.floor((newH - size) / 2), size };
  updateImagePos();
  renderCropBox();
  document.getElementById('zoomLevel').textContent = Math.round(imgScale * 100) + '%';
}

function updateImagePos() {
  const img = document.getElementById('cropImage');
  img.style.left = (-imgOffset.x) + 'px';
  img.style.top = (-imgOffset.y) + 'px';
}

function renderCropBox() {
  const b = document.getElementById('cropBox');
  b.style.left = cropBox.x + 'px';
  b.style.top = cropBox.y + 'px';
  b.style.width = cropBox.size + 'px';
  b.style.height = cropBox.size + 'px';
}

function applyCrop() {
  if (!cropState) return;
  const img = document.getElementById('cropImage');
  const scaleX = cropState.naturalW / cropState.displayW;
  const scaleY = cropState.naturalH / cropState.displayH;
  const scale = Math.min(scaleX, scaleY);
  const sx = (cropBox.x + imgOffset.x) * scale;
  const sy = (cropBox.y + imgOffset.y) * scale;
  const sSize = cropBox.size * scale;
  const canvas = document.createElement('canvas');
  canvas.width = 400; canvas.height = 400;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, sx, sy, sSize, sSize, 0, 0, 400, 400);
  canvas.toBlob(function(blob) {
    croppedBlob = blob; hasCropped = true;
    const url = URL.createObjectURL(blob);
    if (croppedPreviewUrl) URL.revokeObjectURL(croppedPreviewUrl);
    croppedPreviewUrl = url;
    document.getElementById('cropContainer').style.display = 'none';
    document.getElementById('previewContainer').style.display = 'block';
    document.getElementById('previewCropped').src = url;
    document.getElementById('cancelCropBtn').textContent = '\u2190 Retake';
    document.getElementById('applyCropBtn').textContent = '\u2713 Done';
    document.getElementById('applyCropBtn').onclick = confirmCrop;
    document.getElementById('modalTitle').textContent = 'Filters';
    buildFilters(url);
  }, 'image/jpeg', 0.85);
}

function confirmCrop() {
  const url = croppedPreviewUrl;
  const f = filters.find(x => x.name === currentFilter);
  const filterCss = f ? f.css : '';
  const preview = document.getElementById('avatarPreview');
  preview.innerHTML = '';
  const img = document.createElement('img');
  img.id = 'previewImg';
  img.draggable = false;
  img.src = url;
  img.style.filter = filterCss;
  preview.appendChild(img);
  positionPreview(img);
  document.querySelector('.upload-area').style.display = 'block';
  document.querySelector('.btn-group').style.display = 'flex';
  closeModal();
}

function positionPreview(img) {
  const container = document.getElementById('avatarPreview');
  const cw = container.clientWidth, ch = container.clientHeight;
  const s = Math.max(cw, ch) * 1.5;
  previewOffset.x = Math.max(0, (s - cw) / 2);
  previewOffset.y = Math.max(0, (s - ch) / 2);
  img.style.width = s + 'px';
  img.style.height = s + 'px';
  img.style.left = '50%';
  img.style.top = '50%';
  img.style.transform = 'translate(-50%,-50%) translate(' + (-previewOffset.x) + 'px,' + (-previewOffset.y) + 'px)';
}

function cancelCrop() {
  uploadedFile = null; croppedBlob = null; hasCropped = false;
  if (croppedPreviewUrl) { URL.revokeObjectURL(croppedPreviewUrl); croppedPreviewUrl = null; }
  closeModal();
}

function closeModal() {
  imgOffset = { x: 0, y: 0 }; imgScale = 1;
  document.getElementById('cropModal').classList.remove('show');
  document.getElementById('cropContainer').style.display = '';
  document.getElementById('previewContainer').style.display = 'none';
  document.getElementById('cancelCropBtn').textContent = '\u2190 Back';
  document.getElementById('applyCropBtn').textContent = '\u2713 Apply';
  document.getElementById('applyCropBtn').onclick = applyCrop;
  document.getElementById('modalTitle').textContent = 'Crop & Edit';
  document.querySelector('.upload-area').style.display = 'block';
  document.querySelector('.btn-group').style.display = 'flex';
}

document.addEventListener('mousedown', function(e) {
  if (!document.getElementById('cropModal').classList.contains('show')) return;
  if (document.getElementById('cropContainer').style.display === 'none') return;
  const handle = e.target.closest('.crop-handle');
  const box = e.target.closest('.crop-box');
  const rect = document.getElementById('cropViewport').getBoundingClientRect();
  if (handle) {
    const cls = handle.className;
    dragState = { mode: 'resize',
      handle: cls.includes('tl')?'tl':cls.includes('tr')?'tr':cls.includes('bl')?'bl':'br',
      startX: e.clientX - rect.left, startY: e.clientY - rect.top,
      startBox: { x: cropBox.x, y: cropBox.y, size: cropBox.size } };
  } else if (box) {
    dragState = { mode: 'dragBox',
      startX: e.clientX - rect.left, startY: e.clientY - rect.top,
      startBox: { x: cropBox.x, y: cropBox.y, size: cropBox.size } };
  } else {
    dragState = { mode: 'dragImg',
      startX: e.clientX, startY: e.clientY,
      startOff: { x: imgOffset.x, y: imgOffset.y } };
  }
  e.preventDefault();
});

document.addEventListener('mousemove', function(e) {
  if (!dragState || !cropState) return;
  const rect = document.getElementById('cropViewport').getBoundingClientRect();
  const mx = Math.max(0, Math.min(cropState.displayW, e.clientX - rect.left));
  const my = Math.max(0, Math.min(cropState.displayH, e.clientY - rect.top));
  const sb = dragState.startBox;
  const cw = cropState.displayW, ch = cropState.displayH;
  if (dragState.mode === 'dragImg') {
    imgOffset.x = Math.max(0, Math.min(cw - cropBox.size, dragState.startOff.x + (dragState.startX - e.clientX)));
    imgOffset.y = Math.max(0, Math.min(ch - cropBox.size, dragState.startOff.y + (dragState.startY - e.clientY)));
    updateImagePos();
  } else if (dragState.mode === 'dragBox') {
    cropBox.x = Math.max(0, Math.min(cw - sb.size, sb.x + mx - dragState.startX));
    cropBox.y = Math.max(0, Math.min(ch - sb.size, sb.y + my - dragState.startY));
    renderCropBox();
  } else {
    let ax, ay; const h = dragState.handle;
    if (h === 'br') { ax = sb.x; ay = sb.y; }
    else if (h === 'bl') { ax = sb.x + sb.size; ay = sb.y; }
    else if (h === 'tr') { ax = sb.x; ay = sb.y + sb.size; }
    else { ax = sb.x + sb.size; ay = sb.y + sb.size; }
    let size = Math.max(Math.abs(mx - ax), Math.abs(my - ay));
    size = Math.max(20, Math.min(Math.min(cw, ch), size));
    let bx, by;
    if (mx >= ax && my >= ay) { bx = ax; by = ay; }
    else if (mx < ax && my >= ay) { bx = ax - size; by = ay; }
    else if (mx >= ax && my < ay) { bx = ax; by = ay - size; }
    else { bx = ax - size; by = ay - size; }
    if (bx < 0) { bx = 0; size = Math.min(size, ax); }
    if (by < 0) { by = 0; size = Math.min(size, ay); }
    if (bx + size > cw) size = cw - bx;
    if (by + size > ch) size = ch - by;
    cropBox.x = Math.round(bx); cropBox.y = Math.round(by); cropBox.size = Math.round(Math.max(20, size));
    renderCropBox();
  }
});
document.addEventListener('mouseup', function() { dragState = null; previewDragState = null; document.getElementById('avatarPreview').classList.remove('dragging'); });

document.addEventListener('mousedown', function(e) {
  const preview = document.getElementById('avatarPreview');
  const img = document.getElementById('previewImg');
  if (!img || !preview.contains(e.target)) return;
  if (e.target.closest('.upload-btn') || e.target.closest('.btn') || e.target.closest('.modal-overlay')) return;
  preview.classList.add('dragging');
  previewDragState = { startX: e.clientX, startY: e.clientY, offX: previewOffset.x, offY: previewOffset.y, s: img.width };
});

document.addEventListener('mousemove', function(e) {
  if (!previewDragState || !document.getElementById('previewImg')) return;
  const container = document.getElementById('avatarPreview');
  const cw = container.clientWidth, ch = container.clientHeight;
  const s = previewDragState.s;
  const dx = e.clientX - previewDragState.startX;
  const dy = e.clientY - previewDragState.startY;
  previewOffset.x = Math.max(0, Math.min(s - cw, previewDragState.offX - dx));
  previewOffset.y = Math.max(0, Math.min(s - ch, previewDragState.offY - dy));
  const img = document.getElementById('previewImg');
  img.style.transform = 'translate(-50%,-50%) translate(' + (-previewOffset.x) + 'px,' + (-previewOffset.y) + 'px)';
});

function buildFilters(src) {
  const row = document.getElementById("filterRow");
  row.innerHTML = filters.map((f,i) =>
    '<div class="filter-btn ' + (i===0?'active':'') + '" onclick="applyFilter(this,\'' + f.name + '\')">' +
    '<img src="' + src + '" style="filter:' + f.css + '"><span class="flabel">' + f.label + '</span></div>'
  ).join("");
}

function applyFilter(el, name) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  currentFilter = name;
  const f = filters.find(x => x.name === name);
  const previewImg = document.getElementById("previewCropped");
  if (previewImg) previewImg.style.filter = f.css;
}

function save() {
  const error = document.getElementById("saveError");
  const btn = document.getElementById("saveBtn");
  error.textContent = "";
  btn.disabled = true;
  btn.textContent = "Saving...";

  let user = JSON.parse(localStorage.getItem("sn_user") || "{}");
  user.onboarded = true;
  if (uploadedFile || croppedBlob) {
    const blob = croppedBlob || uploadedFile;
    const reader = new FileReader();
    reader.onload = function(e) {
      user.photo = e.target.result;
      localStorage.setItem("sn_user", JSON.stringify(user));
      window.location.href = "home.html";
    };
    reader.readAsDataURL(blob);
  } else {
    localStorage.setItem("sn_user", JSON.stringify(user));
    window.location.href = "home.html";
  }
}

function skip() {
  let user = JSON.parse(localStorage.getItem("sn_user") || "{}");
  user.onboarded = true;
  localStorage.setItem("sn_user", JSON.stringify(user));
  window.location.href = "home.html";
}
</script>
<script>
if (typeof applyTranslation === 'function') applyTranslation();
</script>
</body>
</html>
