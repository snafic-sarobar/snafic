<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon-raw.svg">
<title>Verify Snafic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="translations.js"></script>
<script src="firebase-init.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{min-height:100vh;background:#0b1220;display:flex;align-items:center;justify-content:center;color:white}
.navbar{position:relative;height:56px;display:flex;align-items:center;padding:0 12px;z-index:5}
.bg{position:fixed;inset:0;background:linear-gradient(135deg,#08111f,#0f172a)}
.bg::before,.bg::after{content:"";position:absolute;border-radius:50%;filter:blur(90px);animation:blobMove 10s ease-in-out infinite}
.bg::before{width:380px;height:380px;background:#2563eb;left:-120px;top:-120px}
.bg::after{width:320px;height:320px;background:#60a5fa;right:-80px;bottom:-80px;animation-delay:2s}
@keyframes blobMove{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
.logo{position:absolute;top:8px;left:12px;height:50px;width:auto;background:none;cursor:pointer;display:flex;align-items:center}
.logo img{height:50px;width:auto}
.card{position:relative;overflow:hidden;width:440px;background:rgba(255,255,255,.08);backdrop-filter:blur(25px);border-radius:32px;border:1px solid rgba(255,255,255,.12);padding:40px;text-align:center;z-index:2;box-shadow:0 25px 60px rgba(0,0,0,.25)}
.card::before{content:"";position:absolute;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(96,165,250,.28),transparent 70%);top:-80px;right:-80px}
.icon{font-size:48px;margin-bottom:10px;position:relative;z-index:2}
.card h2{font-size:26px;margin-bottom:6px;position:relative;z-index:2}
.card p{color:#94a3b8;font-size:14px;line-height:1.6;position:relative;z-index:2}
.email-highlight{color:#60a5fa;font-weight:600;word-break:break-all}
.btn{width:100%;padding:16px;border:none;border-radius:16px;margin-top:16px;cursor:pointer;font-weight:700;font-size:15px;color:white;background:linear-gradient(135deg,#2563eb,#60a5fa);transition:.35s;position:relative;z-index:2}
.btn:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(37,99,235,.35)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.15);margin-top:10px}
.btn-outline:hover{background:rgba(255,255,255,.05);box-shadow:none}
.resend{background:transparent;border:none;color:#60a5fa;cursor:pointer;font-size:13px;margin-top:14px;text-decoration:underline;position:relative;z-index:2}
.resend:hover{color:#93c5fd}.resend:disabled{color:#475569;cursor:not-allowed}
.error{color:#ef4444;font-size:13px;margin-top:10px;min-height:20px;position:relative;z-index:2}
.success{color:#22c55e;font-size:13px;margin-top:10px;min-height:20px;position:relative;z-index:2}
.auto-badge{display:inline-block;padding:4px 12px;border-radius:20px;background:rgba(96,165,250,.12);color:#93c5fd;font-size:11px;margin:12px 0;position:relative;z-index:2}
.back-link{display:block;margin-top:16px;color:#64748b;font-size:13px;position:relative;z-index:2}
.back-link a{color:#60a5fa;text-decoration:none}
.divider{height:1px;background:rgba(255,255,255,.08);margin:20px 0;position:relative;z-index:2}
.skip-link{background:transparent;border:none;color:#64748b;cursor:pointer;font-size:12px;text-decoration:underline;position:relative;z-index:2}
.skip-link:hover{color:#94a3b8}
.load-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:500px){.card{padding:24px;margin:0 16px}.card h2{font-size:22px}}
</style>
</head>
<body>
<div class="bg"></div>
<nav class="navbar"><div class="logo"><img src="logo/logo-transparent.png" alt="SNAFIC"></div></nav>
<div class="card">
    <div class="icon">&#x2709;&#xFE0F;</div>
    <h2 data-i18n="verify_title_firebase">Check your email</h2>
    <p data-i18n="verify_desc_firebase">We sent a verification link to</p>
    <p class="email-highlight" id="displayEmail"></p>
    <div class="auto-badge" data-i18n="verify_auto">Verification email sent automatically</div>
    <button class="btn" id="checkBtn" onclick="checkVerification()" data-i18n="verify_check_btn">I've verified — Continue</button>
    <button class="resend" id="resendBtn" onclick="resendEmail()" data-i18n="resend_btn">Resend email</button>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
    <div class="divider"></div>
    <button class="skip-link" onclick="skipNow()" data-i18n="skip_verify">Skip for now</button>
    <div class="back-link"><a href="index.html" data-i18n="back_login">Back to Login</a></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const email = params.get("email") || localStorage.getItem("sn_user") ? JSON.parse(localStorage.getItem("sn_user")).email : "";

document.getElementById("displayEmail").textContent = email;

async function checkVerification() {
  const btn = document.getElementById("checkBtn");
  const error = document.getElementById("errorMsg");
  const success = document.getElementById("successMsg");
  error.textContent = "";
  success.textContent = "";
  btn.disabled = true;
  btn.innerHTML = '<span class="load-spinner"></span> Checking...';

  try {
    if (!auth.currentUser) { error.textContent = "Not signed in. Go back to login."; btn.disabled = false; btn.innerHTML = "I've verified — Continue"; return; }
    await auth.currentUser.reload();
    if (auth.currentUser.emailVerified) {
      await db.collection("users").doc(auth.currentUser.uid).update({ verified: true });
      const session = JSON.parse(localStorage.getItem("sn_user") || "{}");
      session.verified = true;
      localStorage.setItem("sn_user", JSON.stringify(session));
      success.textContent = "Verified! Redirecting...";
      setTimeout(() => { window.location.href = session.onboarded ? "session.html" : (session.username ? "interests.html" : "username.html"); }, 1000);
    } else {
      error.textContent = "Not verified yet. Check your inbox and click the link.";
      btn.disabled = false;
      btn.innerHTML = "I've verified — Continue";
    }
  } catch (e) {
    error.textContent = e.message;
    btn.disabled = false;
    btn.innerHTML = "I've verified — Continue";
  }
}

async function resendEmail() {
  const btn = document.getElementById("resendBtn");
  const success = document.getElementById("successMsg");
  const error = document.getElementById("errorMsg");
  error.textContent = "";
  success.textContent = "";
  btn.disabled = true;

  try {
    if (auth.currentUser) {
      await auth.currentUser.sendEmailVerification();
      success.textContent = "Verification email resent!";
    } else {
      error.textContent = "Not signed in.";
    }
  } catch (e) {
    error.textContent = e.message;
  }
  btn.disabled = false;
}

function skipNow() {
  localStorage.setItem("verifyReminderAt", "never");
  const session = JSON.parse(localStorage.getItem("sn_user") || "{}");
  window.location.href = session.onboarded ? "session.html" : (session.username ? "interests.html" : "username.html");
}

applyTranslation();
if (typeof buildLangDropdown === 'function') buildLangDropdown("langContainer");
</script>
<div class="footer" style="margin-top:30px;padding:20px 0;text-align:center;color:#94a3b8;font-size:13px;width:100%;position:relative;z-index:2">
    <div style="margin-bottom:8px">
        <span data-i18n="copyright">&copy; 2026 snafic.inc</span>
        <span style="color:#475569;margin:0 6px">&middot;</span>
        <a href="mailto:snafic.official@gmail.com" style="color:#60a5fa;text-decoration:none">snafic.official@gmail.com</a>
    </div>
    <div>
        <span data-i18n="developed">Developed by</span>
        <strong style="color:#cbd5e1">Sarobar Adhikari</strong>
    </div>
    <div id="langContainer" style="margin-top:8px;display:inline-block"></div>
</div>
</body>
</html>
