<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Snafic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="translations.js"></script>
<script src="firebase-init.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif}
body{background:#0f1525;color:#e2e8f0;min-height:100vh}
a{text-decoration:none;color:inherit}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:100;height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(15,21,37,.85);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.06)}
.nav-left{display:flex;align-items:center;gap:18px}
.logo{font-size:30px;font-weight:800;background:linear-gradient(90deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.back-btn{width:38px;height:38px;border:none;cursor:pointer;border-radius:50%;background:rgba(255,255,255,.06);color:#94a3b8;display:flex;align-items:center;justify-content:center;transition:.2s}
.back-btn:hover{background:rgba(255,255,255,.1);color:white}
.nav-right{display:flex;align-items:center;gap:12px;color:#64748b;font-size:13px}
.nav-right .sep{color:rgba(255,255,255,.06)}

/* COVER */
.cover{height:280px;background:linear-gradient(135deg,#2563eb,#7c3aed,#ec4899);position:relative}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:0 16px;display:grid;grid-template-columns:360px 1fr;gap:24px;margin-top:-60px;position:relative;z-index:2}

/* LEFT */
.left-panel{display:flex;flex-direction:column;gap:16px}
.about-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px}
.about-card h3{font-size:16px;font-weight:700;margin-bottom:12px}
.about-row{display:flex;align-items:center;gap:10px;font-size:14px;color:#94a3b8;padding:6px 0}
.about-row i{width:18px;color:#64748b}
.about-row span{color:#e2e8f0}
.section-title{font-size:13px;font-weight:600;color:#94a3b8;margin:16px 0 10px;text-transform:uppercase;letter-spacing:.5px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.photo-grid img{width:100%;height:70px;border-radius:8px;object-fit:cover;cursor:pointer;transition:.2s}
.photo-grid img:hover{transform:scale(1.05);opacity:.8}

/* CENTER */
.center-panel{display:flex;flex-direction:column;gap:16px}
.profile-header{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px;display:flex;align-items:center;gap:20px}
.profile-header .avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:28px;flex-shrink:0;border:4px solid #0f1525;margin-top:-50px}
.profile-header .info{flex:1}
.profile-header .info h1{font-size:24px;font-weight:800}
.profile-header .info .meta{color:#64748b;font-size:14px;margin-top:4px}
.profile-header .info .role{color:#60a5fa;font-size:13px;margin-top:2px}
.profile-header .actions{display:flex;gap:10px;margin-top:14px}
.profile-header .actions button{height:38px;padding:0 20px;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#2563eb,#7c3aed);color:white}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:rgba(255,255,255,.08);color:#e2e8f0;border:1px solid rgba(255,255,255,.1)!important}
.btn-secondary:hover{background:rgba(255,255,255,.12)}

.posts-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px}
.posts-card h3{font-size:16px;font-weight:700;margin-bottom:12px}

@media(max-width:900px){.main{grid-template-columns:1fr}.left-panel{order:2}.center-panel{order:1}.profile-header{flex-direction:column;text-align:center}.profile-header .avatar{margin-top:-70px}.profile-header .actions{justify-content:center}}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <button class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="logo" onclick="window.location.href='home.html'">Snafic</div>
  </div>
  <div class="nav-right">
    <span id="profileFollowers">2.2K</span> followers
    <span class="sep">·</span>
    <span id="profileFollowing">22</span> following
  </div>
</nav>

<div class="cover"></div>

<div class="main">
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="about-card">
      <h3>About</h3>
      <div class="about-row"><i class="fa-solid fa-location-dot"></i> Lives in <span id="pLocation">Bharatpur, Nepal</span></div>
      <div class="about-row"><i class="fa-solid fa-house"></i> From <span id="pFrom">Bharatpur, Nepal</span></div>
      <div class="about-row"><i class="fa-solid fa-heart"></i> <span id="pStatus">Single</span></div>
      <div class="section-title">Work</div>
      <div class="about-row"><i class="fa-solid fa-briefcase"></i> <span id="pWork">Student</span></div>
      <div style="font-size:12px;color:#475569;margin-left:28px" id="pWorkDuration">Oct 2010 - Present · 15 years 7 months</div>
      <div class="section-title">Contact Info</div>
      <div class="about-row"><i class="fa-brands fa-instagram"></i> <span id="pContact">@sarobar</span></div>
    </div>
    <div class="about-card">
      <h3>Photos</h3>
      <div class="photo-grid" id="photoGrid">
        <img src="https://i.pravatar.cc/200?img=10">
        <img src="https://i.pravatar.cc/200?img=11">
        <img src="https://i.pravatar.cc/200?img=12">
      </div>
    </div>
  </div>

  <!-- CENTER PANEL -->
  <div class="center-panel">
    <div class="profile-header">
      <div class="avatar" id="pAvatar">SA</div>
      <div class="info">
        <h1 id="pName">Sarobar Adhikari</h1>
        <div class="meta"><span id="pFollowersLabel">2.2K</span> followers · <span id="pFollowingLabel">22</span> following</div>
        <div class="role"><span id="pRole">Digital creator</span> · <span id="pLocationLabel">Bharatpur, Nepal</span></div>
        <div class="actions">
          <button class="btn-primary">Follow</button>
          <button class="btn-secondary">Message</button>
          <button class="btn-secondary">Add Friend</button>
        </div>
      </div>
    </div>

    <div class="posts-card">
      <h3>Posts</h3>
      <div style="text-align:center;color:#475569;padding:40px 0;font-size:14px">No posts available</div>
    </div>
  </div>
</div>

<script>
auth.onAuthStateChanged(u => { if (!u) window.location.href = "index.html"; });

const params = new URLSearchParams(window.location.search);
const username = params.get("user");

const USERS = [
  { name:"Sarobar Adhikari", username:"sarobar", initials:"SA", location:"Bharatpur, Nepal", from:"Bharatpur, Nepal", status:"Single", work:"Student", workDuration:"Oct 2010 - Present · 15 years 7 months", role:"Digital creator", contact:"@sarobar", followers:"2.2K", following:"22", photos:[10,11,12] },
  { name:"Alex Rivera", username:"alex", initials:"AR", location:"New York, USA", from:"Mexico City", status:"Married", work:"Software Engineer", workDuration:"Jan 2018 - Present · 7 years", role:"Developer", contact:"@alex_r", followers:"1.1K", following:"45", photos:[13,14,15] },
  { name:"Maya Chen", username:"maya", initials:"MC", location:"San Francisco, USA", from:"Taipei, Taiwan", status:"Single", work:"Designer", workDuration:"Mar 2019 - Present · 6 years", role:"UI/UX Designer", contact:"@maya_c", followers:"3.4K", following:"28", photos:[16,17,18] },
  { name:"James Wilson", username:"james", initials:"JW", location:"London, UK", from:"Manchester, UK", status:"In a relationship", work:"Product Manager", workDuration:"Jun 2016 - Present · 9 years", role:"PM at Snap", contact:"@james_w", followers:"890", following:"34", photos:[19,20,21] },
  { name:"Priya Sharma", username:"priya", initials:"PS", location:"Mumbai, India", from:"Delhi, India", status:"Single", work:"Content Creator", workDuration:"Jan 2020 - Present · 5 years", role:"Influencer", contact:"@priya_sh", followers:"12.5K", following:"156", photos:[22,23,24] },
  { name:"David Kim", username:"david", initials:"DK", location:"Seoul, Korea", from:"Busan, Korea", status:"Single", work:"Photographer", workDuration:"Aug 2017 - Present · 8 years", role:"Photographer", contact:"@david_k", followers:"5.2K", following:"67", photos:[25,26,27] },
  { name:"Emma Torres", username:"emma", initials:"ET", location:"Madrid, Spain", from:"Barcelona, Spain", status:"Engaged", work:"Marketing Lead", workDuration:"Feb 2015 - Present · 10 years", role:"Marketing", contact:"@emma_t", followers:"4.8K", following:"89", photos:[28,29,30] },
  { name:"Rachana", username:"rachna", initials:"RC", location:"Kathmandu, Nepal", from:"Pokhara, Nepal", status:"Single", work:"Teacher", workDuration:"Apr 2018 - Present · 7 years", role:"Educator", contact:"@rachna", followers:"1.5K", following:"12", photos:[31,32,33] },
  { name:"Anita", username:"anita", initials:"AN", location:"Bharatpur, Nepal", from:"Chitwan, Nepal", status:"Married", work:"Doctor", workDuration:"Jan 2019 - Present · 6 years", role:"Physician", contact:"@anita", followers:"2.1K", following:"24", photos:[34,35,36] }
];

function loadProfile(uname) {
  const user = USERS.find(u => u.username === uname) || USERS[0];
  document.getElementById("pName").textContent = user.name;
  document.getElementById("pAvatar").textContent = user.initials;
  document.getElementById("pLocation").textContent = user.location;
  document.getElementById("pFrom").textContent = user.from;
  document.getElementById("pStatus").textContent = user.status;
  document.getElementById("pWork").textContent = user.work;
  document.getElementById("pWorkDuration").textContent = user.workDuration;
  document.getElementById("pRole").textContent = user.role;
  document.getElementById("pContact").textContent = user.contact;
  document.getElementById("pFollowersLabel").textContent = user.followers;
  document.getElementById("pFollowingLabel").textContent = user.following;
  document.getElementById("profileFollowers").textContent = user.followers;
  document.getElementById("profileFollowing").textContent = user.following;
  document.getElementById("pLocationLabel").textContent = user.location;
  document.getElementById("pLocationLabel").textContent = user.location;
  document.title = user.name + " - Snafic";

  const grid = document.getElementById("photoGrid");
  grid.innerHTML = "";
  user.photos.forEach(n => {
    const img = document.createElement("img");
    img.src = "https://i.pravatar.cc/200?img=" + n;
    grid.appendChild(img);
  });
}

loadProfile(username);
</script>
<script>
if (typeof applyTranslation === 'function') applyTranslation();
</script>
</body>
</html>
